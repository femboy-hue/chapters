<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moments in Bloom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sparkles-container" id="sparkles"></div>

    <div class="main-container">
        
        <div id="page1" class="page active">
            <div class="page-content">
                <h2>Moments in Bloom ✨</h2>
                <p>Click the glass dome to lift the shield and see your surprise...</p>
                
                <div class="dome-stage">
                    <div class="premium-glass-card" id="glassCard">
                        <div class="glass-glow-effect"></div>
                        <div class="glass-inner-border"></div>
                        
                        <img src="20260522053434_file_6a0feaea87dec.avif" alt="Peonies" class="peony-bouquet-img">
                        
                        <div class="card-shimmer"></div>
                    </div>
                </div>

                <button class="primary-btn" id="startStoryBtn">Continue Story</button>
            </div>
        </div>

        <div id="page2" class="page">
            <div class="game-viewport" id="viewport">
                <div class="cinematic-bg"></div>
                
                <div class="real-sun"></div>
                <div class="mountain-ledge"></div>

                <div class="game-choices hidden" id="choicesPanel">
                    <button class="choice-btn accept" id="acceptBtn">Accept Them ❤️</button>
                    <button class="choice-btn deny" id="denyBtn">Deny 😭</button>
                </div>

                <div class="characters-stage">
                    <div class="pixel-character-wrapper boy-char" id="boyChar">
                        <img src="20260522053434_file_6a0feaea87dec.avif" alt="Flower Bubble" class="popup-flower hidden" id="flowerBubble">
                        <div class="custom-boy-avatar">
                            <div class="avatar-hair"></div>
                            <div class="avatar-face"></div>
                            <div class="avatar-suit"><div class="avatar-tie"></div></div>
                        </div>
                    </div>

                    <div class="pixel-character-wrapper girl-char" id="girlChar">
                        <div class="custom-girl-avatar">
                            <div class="girl-hair"></div>
                            <div class="avatar-face"></div>
                            <div class="girl-dress"></div>
                        </div>
                    </div>
                </div>

                <div class="dialogue-box" id="dialogueBox">
                    <div class="dialogue-speaker" id="speakerName">PEANUT</div>
                    <div class="dialogue-text" id="dialogueText">Loading story view... Click anywhere to proceed.</div>
                    <div class="dialogue-arrow">▼</div>
                </div>

            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
